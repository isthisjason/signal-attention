services:
  postgres:
    image: postgres:16
    container_name: signalattention-postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-signalattention}
      POSTGRES_USER: ${POSTGRES_USER:-signalattention}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-signalattention}
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-signalattention} -d ${POSTGRES_DB:-signalattention}"]
      interval: 10s
      timeout: 5s
      retries: 5

  ml-service:
    build:
      context: ./ml-service
    container_name: signalattention-ml-service
    environment:
      ML_SERVICE_PORT: ${ML_SERVICE_PORT:-8000}
    ports:
      - "8000:8000"

  backend:
    build:
      context: ./backend
    container_name: signalattention-backend
    depends_on:
      postgres:
        condition: service_healthy
      ml-service:
        condition: service_started
    environment:
      BACKEND_PORT: ${BACKEND_PORT:-8080}
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_DB: ${POSTGRES_DB:-signalattention}
      POSTGRES_USER: ${POSTGRES_USER:-signalattention}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-signalattention}
      ML_SERVICE_URL: ${ML_SERVICE_URL:-http://ml-service:8000}
    ports:
      - "8080:8080"

volumes:
  postgres-data:
